name: demo CI sử dụng github actions

on: 
  push: 
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        
      - name: Đăng nhập vào dockerHub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        
      - name: Build and push Image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          # Chúng ta sẽ đẩy lên 2 tag cùng lúc: 
          # 1. 'latest' để luôn là bản mới nhất
          # 2. 'v1.0.x' với x là số lần chạy workflow (tự tăng)
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-app:latest
            ${{ secrets.DOCKER_USERNAME }}/my-app:v1.0.${{ github.run_number }}
  
